version: '3.8'

services:
  backend:
    build: .
    container_name: ai-virtual-world-backend
    mem_limit: 2g
    cpus: 1
    volumes:
      - ./backend/data:/app/backend/data
      - ./.git:/app/.git
      - ~/.ssh:/root/.ssh:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - GIT_USER_NAME=${GIT_USER_NAME:-AI Virtual World}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-ai@virtualworld.local}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - ai-world-network

  ollama:
    image: ollama/ollama:latest
    container_name: ai-virtual-world-ollama
    mem_limit: 12g
    cpus: 5
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=1
    restart: unless-stopped
    networks:
      - ai-world-network

volumes:
  ollama_data:
    driver: local

networks:
  ai-world-network:
    driver: bridge
